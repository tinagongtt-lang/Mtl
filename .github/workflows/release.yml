name: 自动打包并发布 Release

# 触发条件：当推送到以 "v" 开头的标签（例如 v0.1.0, v1.2.3）时触发
on:
  push:
    tags:
      - 'v*'

# 给予该工作流创建 Release 的写入权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使用稳定的 3.10 环境进行打包

    # 3. 安装打包工具 build
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    # 4. 运行打包命令，生成 .whl 和 .tar.gz
    - name: Build wheel and sdist
      run: |
        python -m build

    # 5. 自动创建 GitHub Release 并挂载 dist 目录下的打包产物
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        # 自动抓取 commit message 作为发布日志（可选）
        generate_release_notes: true 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}git tag v0.1.0